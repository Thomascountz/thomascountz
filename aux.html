---
layout: default
---

<section class="posts">
  {% for post in site.categories.aux %}
    <h2>{{ post.title }}</h2>

    <span class="meta">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time> &middot; {% for tag in post.tags %}
      <a href="/tag/{{tag}}">{{tag}}</a>{% unless forloop.last %}, {% endunless %}{% endfor %}
    </span>

    {{ post.content }}

  {% endfor %}
</section>
