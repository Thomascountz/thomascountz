---
layout: default
---

<section class="posts">
  <section class="post">
    {% for post in site.categories.aux %}
      <h2>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </h2>

      <strong>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%A %B %-d, %Y" }}</time>
      </strong>

      {{ post.content }}

      <span class="meta">
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%F" }}</time> &middot;
        {% for tag in post.tags %}
          <a href="/tag/{{tag}}">{{tag}}</a>{% unless forloop.last %},{% endunless %}
        {% endfor %}
      </span>
      <hr />
    {% endfor %}
  </section>
</section>
